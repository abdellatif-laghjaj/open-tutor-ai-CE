repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, chore, docs, test, ci, build, perf, style, revert, i18n]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^ui/static/
      - id: end-of-file-fixer
        exclude: ^ui/static/
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: bash -c 'cd ui && npm run format:check'
        pass_filenames: false
        files: ^ui/.*\.(js|ts|svelte|css|json|md|html)$

      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd ui && npm run lint:frontend'
        pass_filenames: false
        files: ^ui/src/.*\.(js|ts|svelte)$

      - id: i18n-parse
        name: i18n keys
        language: system
        entry: bash -c 'cd ui && npm run i18n:parse'
        pass_filenames: false
        files: ^ui/src/.*\.(js|ts|svelte)$
